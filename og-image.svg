  <rect x="800" y="160" width="320" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="800" y="160" width="320" height="40" rx="16" fill="rgba(255,255,255,0.04)"/>
  <circle cx="826" cy="180" r="6" fill="#ff5f57"/>
