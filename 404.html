<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Ezenwa Joseph Chibuzo</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { overflow: hidden; }

    .err-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .err-blob-1 {
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,107,53,0.18) 0%, transparent 70%);
      top: -200px; right: -100px;
      animation: blobF 8s ease-in-out infinite;
      border-radius: 50%;
      filter: blur(60px);
    }
    .err-blob-2 {
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
      bottom: -100px; left: -80px;
      animation: blobF 10s ease-in-out infinite reverse;
      border-radius: 50%;
      filter: blur(60px);
    }
    @keyframes blobF {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,-20px) scale(1.08); }
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .err-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .err-code {
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 16rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.06em;
      background: linear-gradient(135deg, var(--clr-accent1) 0%, var(--clr-accent2) 50%, var(--clr-accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0;
      animation: codeFloat 4s ease-in-out infinite;
      user-select: none;
    }
    @keyframes codeFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .err-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--clr-accent1);
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.25);
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 20px;
      display: inline-block;
    }

    .err-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .err-desc {
      color: var(--clr-text-muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 36px;
    }

    .err-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 56px;
    }

    .err-links {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .err-link {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--clr-text-dim);
      letter-spacing: 0.05em;
      transition: color 0.2s;
      text-decoration: none;
    }
    .err-link:hover { color: var(--clr-accent1); }
    .err-link::before { content: '→ '; }

    .err-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 10;
    }
    .err-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--clr-text);
    }
    .err-logo span { color: var(--clr-accent1); }

    @media (max-width: 640px) {
      .err-nav { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <nav class="err-nav">
    <a href="index.html" class="err-logo">EJC<span>.</span></a>
  </nav>

  <div class="err-bg">
    <div class="err-blob-1"></div>
    <div class="err-blob-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="err-container">
    <div class="err-code">404</div>
    <span class="err-label">Page Not Found</span>
    <h1 class="err-title">You've wandered off the map.</h1>
    <p class="err-desc">
      This page doesn't exist — or maybe it moved. Either way, let's get you back somewhere useful.
    </p>

    <div class="err-actions">
      <a href="index.html" class="btn btn-primary">Go Home <span class="btn-arrow">→</span></a>
      <a href="contact.html" class="btn btn-ghost">Contact Me</a>
    </div>

    <div class="err-links">
      <a href="about.html" class="err-link">About</a>
      <a href="projects.html" class="err-link">Projects</a>
      <a href="skills.html" class="err-link">Skills</a>
    </div>
  </div>

</body>
</html>
